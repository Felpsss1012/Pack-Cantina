<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cantina</title>
    <link rel="shortcut icon" href="/img/icon.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style/styles.css">
    <script src="https://cdn.socket.io/4.8.0/socket.io.min.js"></script>
</head>

<body>
    <div class="container">
        <div class="panel">
            <header>
                <div>
                    <h1>Cardápio da Cantina</h1>
                    <div class="lead">Categorias automáticas — toque em + para adicionar e 🗑️ para remover um produto.</div>
                </div>
            </header>

            <div class="search-container">
                <div class="search-box">
                    <input type="text" id="searchProducts" placeholder="Buscar produtos..." />
                    <button id="clearSearch" class="clear-search" title="Limpar busca">&times;</button>
                </div>
            </div>

            <div id="catsNav" class="cats"></div>

            <div id="categories"></div>

        </div>

        <div class="panel">
            <div class="cart-title">
                <h2>Carrinho</h2>
                <div class="small-muted">Certifique-se antes de enviar</div>
            </div>
            <div class="cart-list" id="cart-list"></div>
            <div class="total" id="total">Total: R$ 0,00</div>
            <button class="pay-btn" id="finalizeBtn">Finalizar pedido</button>
        </div>
    </div>

    <!-- modal: finalizar pedido (mantido) -->
    <div class="modal" id="modal">
        <div class="modal-card">
            <h3>Finalizar pedido</h3>
            <div class="field"><label class="small-muted">Nome do comprador</label><input id="buyerName"
                    placeholder="Ex: Maria Souza"></div>
            <div class="field"><label class="small-muted">Forma de pagamento</label>
                <select id="paymentMethod">
                    <option>Dinheiro</option>
                    <option>Cartão Crédito</option>
                    <option>Cartão Débito</option>
                    <option>PIX</option>
                </select>
            </div>
            <div class="field"><label class="small-muted">Observações (opcional)</label><textarea id="note" rows="3"
                    placeholder="Sem cebola..."></textarea></div>
            <div style="display:flex;gap:8px;margin-top:8px"><button class="btn-circle"
                    id="cancelBtn">Cancelar</button><button class="btn-add" id="submitBtn"
                    style="flex:1;border-radius:10px;padding:10px">Enviar pedido</button></div>
        </div>
    </div>

    <!-- Modal: Adicionar Produto -->
    <div id="addProductModal" class="modal" aria-hidden="true" style="display:none;">
        <div class="modal-content cardapio-modal-content" style="max-width:520px;">
            <span class="close" id="closeAddProductModal">&times;</span>
            <h2>Novo Produto</h2>
            <form id="addProductForm">
                <div class="form-group">
                    <label for="newProductName">Nome</label>
                    <input id="newProductName" name="name" required />
                </div>

                <!-- Categoria: select fixo + opção 'Outra...' -->
                <div class="form-group">
                    <label for="newProductCategory">Categoria</label>
                    <select id="newProductCategory" name="category">
                        <option value="Doces">Doces</option>
                        <option value="Salgados">Salgados</option>
                        <option value="Bebidas">Bebidas</option>
                        <option value="Outros">Outros</option>
                        <option value="__outra__">Outra...</option>
                    </select>
                    <input id="newProductCategoryCustom" placeholder="Digite nova categoria" style="display:none;margin-top:8px" />
                </div>

                <div class="form-group">
                    <label for="newProductPrice">Preço (ex: 3.50)</label>
                    <input id="newProductPrice" name="price" type="number" step="0.01" required />
                </div>
                <div class="form-group">
                    <label for="newProductQty">Quantidade inicial</label>
                    <input id="newProductQty" name="quantity" type="number" min="0" value="0" />
                </div>
                <button type="submit" class="btn-save-cardapio">Adicionar</button>
            </form>
        </div>
    </div>

    <!-- Modal ajustar estoque (agora com campos 'Quem' e 'Fornecedor' opcionais) -->
    <div id="adjustStockModal" class="modal" aria-hidden="true" style="display:none;">
        <div class="modal-content modal-card" style="max-width:520px;">
            <span class="close" id="closeAdjustStockModal">&times;</span>
            <h3>Gerenciar Estoque: <span id="adjustProductNameLabel"></span></h3>
            <form id="adjustStockForm">
                <input type="hidden" id="adjustProductId" name="product_id" value="">
                <div class="field">
                    <label>Tipo</label>
                    <select id="adjustType" name="type">
                        <option value="entrada">Entrada (compra)</option>
                        <option value="saida">Saída (venda/uso)</option>
                    </select>
                </div>
                <div class="field">
                    <label>Quantidade</label>
                    <input id="adjustQty" name="qty" type="number" min="1" value="1" required />
                </div>
                <div class="field">
                    <label>Preço unitário (opcional)</label>
                    <input id="adjustUnitPrice" name="unit_price" type="number" step="0.01" />
                </div>

                <!-- novo: fornecedor (opcional, visível/útil em 'entrada') -->
                <div class="field" id="adjustSupplierField" style="display:none;">
                    <label>Fornecedor (opcional)</label>
                    <input id="adjustSupplier" name="supplier" type="text" placeholder="Ex: Fornecedor LTDA" />
                </div>

                <div style="display:flex; gap:8px; margin-top:8px;">
                    <button type="button" class="btn-circle" id="adjustCancelBtn">Cancelar</button>
                    <button type="submit" class="btn-add" style="flex:1;border-radius:10px;padding:10px">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/script/script.js"></script>
</body>

</html>
